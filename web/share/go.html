<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script>
        // URL에서 target URL 파라미터 값을 추출해서 바로 리다이렉트
        const params = new URLSearchParams(window.location.search);
        const target = params.get('target');
        if (target) {
            window.location.replace(decodeURIComponent(target));
        } else {
            window.location.replace('/'); // target 없으면 홈으로
        }
    </script>
</head>
<body>
이동 중입니다...
</body>
</html>
